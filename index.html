<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Islamic Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      padding: 1.5rem;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .nav button {
      font-size: 13px;
      padding: 5px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    .nav button:hover { background: #f0f0f0; }

    #greg-head {
      font-size: 17px;
      font-weight: 500;
      color: #A32D2D;
      text-align: center;
    }

    #hijri-head {
      font-size: 13px;
      color: #185FA5;
      text-align: center;
      margin-top: 2px;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }

    .day-head {
      font-size: 11px;
      color: #888;
      text-align: center;
      padding: 4px 0 8px;
    }

    .cell {
      border-radius: 8px;
      padding: 4px 2px;
      text-align: center;
      min-height: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border: 0.5px solid transparent;
      background: white;
    }

    .cell:hover { background: #f5f5f5; }

    .greg-num {
      font-size: 14px;
      font-weight: 500;
      color: #A32D2D;
      line-height: 1;
    }

    .hijri-num {
      font-size: 11px;
      color: #0C447C;
      line-height: 1;
    }

    .cell-today {
      background: #f0f0f0;
      border: 0.5px solid #aaa;
    }

    .greg-today {
      font-size: 15px;
      color: #791F1F;
      font-weight: 500;
    }

    .hijri-today { color: #042C53; font-weight: 500; }

    .cell-event { background: #FAEEDA; }
    .cell-event .greg-num { color: #633806; }
    .cell-event .hijri-num { color: #412402; }

    .ev-badge {
      font-size: 9px;
      background: #EF9F27;
      color: #412402;
      border-radius: 3px;
      padding: 1px 4px;
      line-height: 1.4;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 1rem;
      margin-bottom: 1rem;
      font-size: 12px;
      color: #666;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 3px;
      vertical-align: middle;
      margin-right: 4px;
    }

    .events-section { margin-top: 1rem; }

    .events-section p.label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .ev-row {
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .g-pill {
      font-size: 11px;
      font-weight: 500;
      background: #FCEBEB;
      color: #791F1F;
      border-radius: 4px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .h-pill {
      font-size: 11px;
      font-weight: 500;
      background: #E6F1FB;
      color: #0C447C;
      border-radius: 4px;
      padding: 2px 7px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <h1>Islamic Calendar</h1>

  <div class="nav">
    <button onclick="shift(-1)">← prev</button>
    <div>
      <div id="greg-head"></div>
      <div id="hijri-head"></div>
    </div>
    <button onclick="shift(1)">next →</button>
  </div>

  <div class="day-grid" id="day-heads"></div>
  <div class="day-grid" id="cal-grid"></div>

  <div class="legend">
    <span>
      <span class="legend-dot" style="background:#FCEBEB; border:1px solid #F09595;"></span>
      <span style="color:#A32D2D;">gregorian date</span>
    </span>
    <span>
      <span class="legend-dot" style="background:#E6F1FB; border:1px solid #85B7EB;"></span>
      <span style="color:#185FA5;">hijri date</span>
    </span>
    <span>
      <span class="legend-dot" style="background:#FAEEDA; border:1px solid #EF9F27;"></span>
      islamic event
    </span>
  </div>

  <div class="events-section" id="events-section"></div>

  <script>
    const GREG_MONTHS = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];
    const HIJRI_MONTHS = [
      "Muharram","Safar","Rabi' al-Awwal","Rabi' al-Thani",
      "Jumada al-Awwal","Jumada al-Thani","Rajab","Sha'ban",
      "Ramadan","Shawwal","Dhu al-Qi'dah","Dhu al-Hijjah"
    ];
    const WDAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    const EVENTS = {
      "1-1":  "Islamic New Year",
      "1-10": "Day of Ashura",
      "3-12": "Mawlid al-Nabi",
      "7-27": "Isra' and Mi'raj",
      "8-15": "Laylat al-Bara'at",
      "9-1":  "Start of Ramadan",
      "9-27": "Laylat al-Qadr",
      "10-1": "Eid al-Fitr",
      "12-8": "Start of Hajj",
      "12-9": "Day of Arafah",
      "12-10":"Eid al-Adha"
    };

    function toJD(y, m, d) {
      if (m < 3) { y--; m += 12; }
      const A = Math.floor(y / 100), B = 2 - A + Math.floor(A / 4);
      return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524;
    }

    function g2h(y, m, d) {
      const jd = toJD(y, m, d);
      let l = jd - 1948440 + 10632;
      const n = Math.floor((l - 1) / 10631);
      l = l - 10631 * n + 354;
      const j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) +
                (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
      l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) -
          (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
      const hm = Math.floor((24 * l) / 709);
      const hd = l - Math.floor((709 * hm) / 24);
      const hy = 30 * n + j - 30;
      return [hy, hm, hd];
    }

    function daysInG(y, m) { return new Date(y, m, 0).getDate(); }
    function dowMon(d) { return d.getDay() === 0 ? 6 : d.getDay() - 1; }
    function getEv(hm, hd) { return EVENTS[hm + "-" + hd] || null; }

    const today = new Date();
    let gY = today.getFullYear(), gM = today.getMonth() + 1;

    function render() {
      const total = daysInG(gY, gM);
      const firstDow = dowMon(new Date(gY, gM - 1, 1));
      const [hy1, hm1] = g2h(gY, gM, 1);
      const [hy2, hm2] = g2h(gY, gM, total);
      const hSpan = hm1 === hm2
        ? `${HIJRI_MONTHS[hm1 - 1]} ${hy1} AH`
        : `${HIJRI_MONTHS[hm1 - 1]} – ${HIJRI_MONTHS[hm2 - 1]} ${hy1 === hy2 ? hy1 : hy1 + ' – ' + hy2} AH`;

      document.getElementById('greg-head').textContent = `${GREG_MONTHS[gM - 1]} ${gY}`;
      document.getElementById('hijri-head').textContent = hSpan;
      document.getElementById('day-heads').innerHTML = WDAYS.map(w =>
        `<div class="day-head">${w}</div>`).join('');

      const events = [];
      let html = '';
      for (let i = 0; i < firstDow; i++) html += '<div></div>';

      for (let d = 1; d <= total; d++) {
        const [hy, hm, hd] = g2h(gY, gM, d);
        const isToday = (
          gY === today.getFullYear() &&
          gM === today.getMonth() + 1 &&
          d  === today.getDate()
        );
        const ev = getEv(hm, hd);
        if (ev) events.push({ d, hd, hm, hy, ev });

        let cellCls = 'cell';
        let gCls    = 'greg-num';
        let hCls    = 'hijri-num';
        if (isToday)  { cellCls += ' cell-today'; gCls += ' greg-today'; hCls += ' hijri-today'; }
        else if (ev)  { cellCls += ' cell-event'; }

        html += `<div class="${cellCls}">
          <span class="${gCls}">${d}</span>
          <span class="${hCls}">${hd}</span>
          ${ev ? `<div class="ev-badge">${ev}</div>` : ''}
        </div>`;
      }

      document.getElementById('cal-grid').innerHTML = html;

      const sec = document.getElementById('events-section');
      if (!events.length) {
        sec.innerHTML = '<p style="font-size:13px;color:#888;">No major Islamic events this month.</p>';
      } else {
        sec.innerHTML = '<p class="label">Islamic events this month</p>' +
          events.map(({ d, hd, hm, hy, ev }) => `
            <div class="ev-row">
              <span class="g-pill">${d} ${GREG_MONTHS[gM - 1].slice(0, 3)} ${gY}</span>
              <span class="h-pill">${hd} ${HIJRI_MONTHS[hm - 1].slice(0, 6)} ${hy} AH</span>
              <span>${ev}</span>
            </div>`).join('');
      }
    }

    function shift(dir) {
      gM += dir;
      if (gM > 12) { gM = 1; gY++; }
      if (gM < 1)  { gM = 12; gY--; }
      render();
    }

    render();
  </script>
</body>
</html>
